<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作日誌系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════════
  🔧 STEP 1: 把下面的設定值換成你自己的 Firebase 專案設定
  前往 https://console.firebase.google.com → 專案設定 → 你的應用程式
════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ↓↓↓ 把這裡換成你的 Firebase 設定 ↓↓↓
  const firebaseConfig = {
  apiKey: "AIzaSyBnNdGB0_WhEhdiO7u1EleEqOnVt5_mmP8",
  authDomain: "work-journal-3e2a4.firebaseapp.com",
  projectId: "work-journal-3e2a4",
  storageBucket: "work-journal-3e2a4.firebasestorage.app",
  messagingSenderId: "1032670616574",
  appId: "1:1032670616574:web:6b077051763b3ecfbdfeaf",
  };
  // ↑↑↑ 換到這裡為止 ↑↑↑

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── 白名單：只有這些 Google 帳號可以登入 ──
  // 改成公司同仁的 Gmail 帳號
  const ALLOWED_EMAILS = [
    "valerieleetw@gmail.com",
   
  ];

  // ── 成員顯示名稱對照（email → 姓名/部門） ──
  const MEMBER_MAP = {
    "valerieleetw@gmail.com":   { name:"測試", dept:"行政",  role:"機器人帳號",   isAdmin: true  },
  };

  const AVATAR_COLORS = ['#c0392b','#2d6a4f','#b8963e','#2c3e50','#8e44ad','#16a085','#d35400'];

  // ── 全域狀態 ──
  let currentUser   = null;
  let currentMember = null;
  let allLogs       = [];
  let selectedMood  = '🙂';

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // AUTH
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.loginWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const email  = result.user.email;
      if (!ALLOWED_EMAILS.includes(email)) {
        await signOut(auth);
        showMsg('❌ 此帳號不在授權名單內，請聯繫管理員。', 'error');
        return;
      }
    } catch(e) {
      showMsg('登入失敗：' + e.message, 'error');
    }
  };

  window.logout = async () => {
    await signOut(auth);
    currentUser = null; currentMember = null;
    showScreen('login');
  };

  onAuthStateChanged(auth, user => {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
      currentUser   = user;
      currentMember = MEMBER_MAP[user.email] || { name: user.displayName, dept:'?', role:'', isAdmin:false };
      document.getElementById('f-name').value = currentMember.name;
      document.getElementById('userBadge').textContent = currentMember.name;
      showScreen('app');
      startRealtimeSync();
    } else {
      showScreen('login');
    }
  });

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // FIRESTORE — REALTIME SYNC
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function startRealtimeSync() {
    const q = query(collection(db, 'logs'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snapshot => {
      allLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderEntries();
      renderDash();
    });
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // SUBMIT LOG
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.submitLog = async () => {
    if (!currentUser) { showMsg('請先登入', 'error'); return; }
    const summary = document.getElementById('f-summary').value.trim();
    if (!summary) { showMsg('請填寫今日重點摘要', 'error'); return; }

    const taskItems = [...document.querySelectorAll('#taskList .task-item')];
    const tasks = taskItems
      .map(li => ({ text: li.querySelector('input').value.trim(), status: li.querySelector('select').value }))
      .filter(t => t.text);

    const entry = {
      userEmail:  currentUser.email,
      userName:   currentMember.name,
      userDept:   currentMember.dept,
      userRole:   currentMember.role,
      date:       document.getElementById('f-date').value,
      summary,
      note:       document.getElementById('f-note').value.trim(),
      mood:       selectedMood,
      tasks,
      createdAt:  serverTimestamp(),
    };

    try {
      await addDoc(collection(db, 'logs'), entry);
      showMsg('✅ 日誌已提交並同步！', 'success');
      resetForm();
    } catch(e) {
      showMsg('提交失敗：' + e.message, 'error');
    }
  };

  function resetForm() {
    document.getElementById('f-summary').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('taskList').innerHTML = makeTaskItem();
  }
  function makeTaskItem() {
    return `<li class="task-item">
      <input type="text" placeholder="例：整理客戶提案資料">
      <select><option value="done">✅ 完成</option><option value="wip" selected>🔄 進行中</option><option value="delayed">⏸ 延誤/未完</option></select>
      <button class="btn-icon" onclick="removeTask(this)">✕</button>
    </li>`;
  }

  window.addTask = () => {
    const li = document.createElement('li');
    li.className = 'task-item';
    li.innerHTML = `<input type="text" placeholder="工作任務項目">
      <select><option value="done">✅ 完成</option><option value="wip" selected>🔄 進行中</option><option value="delayed">⏸ 延誤/未完</option></select>
      <button class="btn-icon" onclick="removeTask(this)">✕</button>`;
    document.getElementById('taskList').appendChild(li);
  };
  window.removeTask = btn => {
    const list = document.getElementById('taskList');
    if (list.children.length > 1) btn.closest('li').remove();
  };

  window.selectMood = (el, mood) => {
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedMood = mood;
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // RENDER — ENTRIES
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.renderEntries = () => {
    let filtered = [...allLogs];
    const fm = document.getElementById('filterMember')?.value;
    const fd = document.getElementById('filterDate')?.value;
    const fs = document.getElementById('filterStatus')?.value;
    if (fm) filtered = filtered.filter(l => l.userEmail === fm);
    if (fd) filtered = filtered.filter(l => l.date === fd);
    if (fs) filtered = filtered.filter(l => (l.tasks||[]).some(t => t.status === fs));

    const c = document.getElementById('entriesContainer');
    if (!c) return;
    c.innerHTML = filtered.length === 0
      ? '<div class="empty-state">找不到符合條件的日誌記錄</div>'
      : filtered.map(e => entryCard(e)).join('');

    // populate member filter dropdown
    const sel = document.getElementById('filterMember');
    if (sel && sel.options.length <= 1) {
      const emails = [...new Set(allLogs.map(l => l.userEmail))];
      emails.forEach(email => {
        const m = MEMBER_MAP[email];
        if (!m) return;
        const opt = document.createElement('option');
        opt.value = email; opt.textContent = m.name;
        sel.appendChild(opt);
      });
    }
  };

  function memberColor(email) {
    const emails = Object.keys(MEMBER_MAP);
    return AVATAR_COLORS[emails.indexOf(email) % AVATAR_COLORS.length];
  }

  function entryCard(e) {
    const color = memberColor(e.userEmail);
    const tasks = e.tasks || [];
    const chips = tasks.map(t => `
      <span class="task-chip ${t.status}">
        <span class="task-dot"></span>${t.text}
      </span>`).join('');
    const noteBlock = e.note ? `
      <div class="note-block">
        <span class="note-block-label">備註 / 待協助</span>${e.note}
      </div>` : '';
    return `
      <div class="entry-card" onclick="this.classList.toggle('expanded')">
        <div class="entry-header">
          <div>
            <div class="entry-meta">
              <span class="avatar sm" style="background:${color}">${(e.userName||'?')[0]}</span>
              <span class="entry-author">${e.userName||e.userEmail}</span>
              <span class="dept-tag">${e.userDept||'?'}</span>
              <span class="entry-mood">${e.mood||''}</span>
            </div>
            <div class="entry-summary">${e.summary}</div>
          </div>
          <div class="entry-date">${formatDate(e.date)}</div>
        </div>
        <div class="entry-details">
          <div class="tasks-section">
            <h4>工作任務</h4>
            <div class="task-chips">${chips||'<span style="font-size:0.8rem;color:var(--muted)">無任務項目</span>'}</div>
          </div>
          ${noteBlock}
        </div>
      </div>`;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // RENDER — DASHBOARD
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.renderDash = () => {
    const today = isoToday();
    const todayLogs = allLogs.filter(l => l.date === today);
    const allTasks  = allLogs.flatMap(l => l.tasks||[]);

    const sg = document.getElementById('statsGrid');
    if (sg) sg.innerHTML = `
      <div class="stat-card"><div class="stat-num">${Object.keys(MEMBER_MAP).filter(e=>!MEMBER_MAP[e].isAdmin).length}</div><div class="stat-label">團隊成員</div></div>
      <div class="stat-card"><div class="stat-num">${todayLogs.length}</div><div class="stat-label">今日已提交</div></div>
      <div class="stat-card"><div class="stat-num">${allLogs.length}</div><div class="stat-label">總日誌筆數</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--success)">${allTasks.filter(t=>t.status==='done').length}</div><div class="stat-label">累計完成任務</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#856404">${allTasks.filter(t=>t.status==='delayed').length}</div><div class="stat-label">待處理/延誤</div></div>
    `;

    const mg = document.getElementById('memberGrid');
    if (mg) {
      const members = Object.entries(MEMBER_MAP).filter(([,v]) => !v.isAdmin);
      mg.innerHTML = members.map(([email, m], i) => {
        const todayLog = todayLogs.find(l => l.userEmail === email);
        const status = todayLog
          ? `<span style="color:var(--success);font-size:0.78rem;font-family:'DM Mono',monospace">✅ 今日已提交 ${todayLog.mood}</span>`
          : `<span style="color:var(--accent);font-size:0.78rem;font-family:'DM Mono',monospace">⏳ 尚未提交</span>`;
        const taskList = todayLog
          ? (todayLog.tasks||[]).map(t => `<div style="padding:2px 0">${{done:'✅',wip:'🔄',delayed:'⏸'}[t.status]} ${t.text}</div>`).join('')
          : '<div style="color:var(--muted)">—</div>';
        return `<div class="member-card">
          <div class="member-card-head">
            <div class="avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">${m.name[0]}</div>
            <div><div class="member-name">${m.name}</div><div class="member-role">${m.dept} · ${m.role}</div></div>
          </div>
          <div class="member-last">${status}</div>
          <div class="member-today-tasks">${taskList}</div>
        </div>`;
      }).join('');
    }

    const re = document.getElementById('recentEntries');
    if (re) re.innerHTML = allLogs.slice(0,10).map(e => entryCard(e)).join('') || '<div class="empty-state">尚無日誌</div>';
  };

  // ── Utilities ──
  window.clearFilters = () => {
    ['filterMember','filterDate','filterStatus'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    renderEntries();
  };
  window.showPanel = (id, el) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-'+id).classList.add('active');
    el.classList.add('active');
    if (id==='dash') renderDash();
    if (id==='view') renderEntries();
  };

  function isoToday() { return new Date().toISOString().split('T')[0]; }
  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
  }
  function showMsg(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
  }
  function showScreen(name) {
    document.getElementById('screen-login').style.display = name==='login' ? 'flex' : 'none';
    document.getElementById('screen-app').style.display   = name==='app'   ? 'block' : 'none';
  }

  // init
  window.addEventListener('DOMContentLoaded', () => {
    const today = isoToday();
    document.getElementById('f-date').value = today;
    document.getElementById('todayDateLabel').textContent = formatDate(today);
    document.getElementById('dashDateLabel').textContent  = formatDate(today);
    showScreen('login');
  });
</script>

<style>
  :root {
    --ink:#1a1a18; --paper:#f5f0e8; --paper-alt:#ede8d8;
    --accent:#c0392b; --accent-soft:#e8d5d2;
    --gold:#b8963e; --border:#c8c0a8; --muted:#8a8070;
    --success:#2d6a4f; --success-bg:#d8f3dc;
    --tag-bg:#e8e0d0; --shadow:rgba(26,26,24,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif;min-height:100vh;
    background-image:linear-gradient(rgba(200,192,168,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(200,192,168,.15) 1px,transparent 1px);
    background-size:40px 40px}

  /* ─ LOGIN SCREEN ─ */
  #screen-login{
    min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;
  }
  .login-box{
    background:#fff;border:1px solid var(--border);border-radius:4px;padding:3rem 2.5rem;
    text-align:center;max-width:380px;width:90%;
    box-shadow:6px 6px 0 var(--paper-alt),6px 6px 0 1px var(--border);
  }
  .login-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;margin-bottom:.5rem}
  .login-logo span{color:var(--accent)}
  .login-sub{font-size:.82rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.04em;margin-bottom:2rem}
  .btn-google{
    display:inline-flex;align-items:center;gap:.75rem;
    padding:.8rem 1.5rem;border:1px solid var(--border);border-radius:3px;
    background:#fff;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;
    transition:all .2s;width:100%;justify-content:center;
  }
  .btn-google:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .google-icon{width:20px;height:20px;flex-shrink:0}

  /* ─ APP SCREEN ─ */
  #screen-app{display:none}
  header{
    background:var(--ink);color:var(--paper);padding:0 2rem;
    display:flex;align-items:center;justify-content:space-between;height:60px;
    position:sticky;top:0;z-index:100;box-shadow:0 2px 16px var(--shadow);
  }
  .logo{font-family:'Fraunces',serif;font-size:1.35rem;letter-spacing:.04em;display:flex;align-items:center;gap:10px}
  .logo span{color:var(--gold)}
  .header-right{display:flex;align-items:center;gap:.75rem}
  .user-badge{
    font-family:'DM Mono',monospace;font-size:.75rem;
    background:rgba(255,255,255,.12);padding:4px 12px;border-radius:20px;
    letter-spacing:.05em;border:1px solid rgba(255,255,255,.18);
  }
  .btn-logout{
    font-size:.75rem;font-family:'DM Mono',monospace;letter-spacing:.04em;
    background:none;border:1px solid rgba(255,255,255,.3);color:var(--paper);
    padding:4px 10px;border-radius:20px;cursor:pointer;transition:background .2s;
  }
  .btn-logout:hover{background:rgba(255,255,255,.15)}

  .nav-tabs{display:flex;background:var(--paper-alt);border-bottom:2px solid var(--border);padding:0 2rem;overflow-x:auto}
  .nav-tab{padding:.75rem 1.5rem;font-size:.85rem;cursor:pointer;border-bottom:3px solid transparent;
    margin-bottom:-2px;white-space:nowrap;color:var(--muted);letter-spacing:.04em;transition:all .2s;font-weight:600}
  .nav-tab:hover{color:var(--ink)}
  .nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
  .panel{display:none}
  .panel.active{display:block}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
  .section-head h2{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;letter-spacing:.02em}
  .section-head h2 em{font-style:italic;color:var(--accent)}
  .section-subtitle{font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace}

  .form-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:2rem;box-shadow:4px 4px 0 var(--paper-alt),4px 4px 0 1px var(--border)}
  .form-row{margin-bottom:1.25rem}
  .form-row label{display:block;font-size:.78rem;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase}
  .form-row input,.form-row select,.form-row textarea{
    width:100%;padding:.65rem .85rem;border:1px solid var(--border);border-radius:3px;
    background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif;font-size:.92rem;
    transition:border-color .2s,box-shadow .2s;outline:none;
  }
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .form-row textarea{resize:vertical;min-height:90px;line-height:1.7}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media(max-width:600px){.form-grid{grid-template-columns:1fr}}

  .task-list{list-style:none}
  .task-item{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
  .task-item input[type="text"]{flex:1}
  .task-item select{width:110px;flex-shrink:0}
  .btn-icon{width:32px;height:32px;border:1px solid var(--border);background:var(--paper);border-radius:3px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  .btn-icon:hover{background:var(--accent-soft)}
  .btn-add-task{font-size:.78rem;font-family:'DM Mono',monospace;color:var(--accent);cursor:pointer;background:none;border:none;letter-spacing:.05em;margin-top:.4rem;padding:0}
  .btn-add-task:hover{text-decoration:underline}

  .mood-row{display:flex;gap:.5rem;flex-wrap:wrap}
  .mood-chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.85rem;cursor:pointer;transition:all .2s;background:var(--paper)}
  .mood-chip:hover{border-color:var(--accent)}
  .mood-chip.selected{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .btn-submit{width:100%;padding:.85rem;background:var(--ink);color:var(--paper);border:none;border-radius:3px;font-family:'Noto Serif TC',serif;font-size:.95rem;cursor:pointer;letter-spacing:.06em;margin-top:.5rem;transition:background .2s}
  .btn-submit:hover{background:var(--accent)}

  .filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
  .filter-bar select,.filter-bar input{padding:.45rem .8rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);font-family:'DM Mono',monospace;font-size:.8rem;color:var(--ink);outline:none}
  .filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
  .btn-small{padding:4px 12px;border:1px solid var(--border);border-radius:3px;background:#fff;font-size:.75rem;font-family:'DM Mono',monospace;cursor:pointer;transition:background .15s;letter-spacing:.03em;flex-shrink:0}
  .btn-small:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .entry-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem 1.5rem;margin-bottom:1rem;transition:box-shadow .2s;cursor:pointer}
  .entry-card:hover{box-shadow:3px 3px 0 var(--border)}
  .entry-header{display:flex;align-items:flex-start;gap:1rem;justify-content:space-between}
  .entry-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
  .entry-date{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);flex-shrink:0}
  .entry-author{font-weight:700;font-size:.85rem}
  .dept-tag{font-family:'DM Mono',monospace;font-size:.68rem;background:var(--tag-bg);padding:2px 8px;border-radius:2px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
  .entry-summary{font-size:.88rem;color:var(--muted);margin-top:.4rem;line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry-card.expanded .entry-summary{white-space:normal;color:var(--ink)}
  .entry-details{display:none;margin-top:1rem}
  .entry-card.expanded .entry-details{display:block}

  .tasks-section{margin-top:.75rem}
  .tasks-section h4{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}
  .task-chips{display:flex;flex-wrap:wrap;gap:.4rem}
  .task-chip{font-size:.8rem;padding:4px 10px;border-radius:3px;display:flex;align-items:center;gap:5px}
  .task-chip.done{background:var(--success-bg);color:var(--success)}
  .task-chip.wip{background:#fff3cd;color:#856404}
  .task-chip.delayed{background:#f8d7da;color:#721c24}
  .task-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .note-block{margin-top:.75rem;padding:.75rem;background:var(--paper);border-left:3px solid var(--gold);font-size:.86rem;line-height:1.7;color:var(--ink);font-style:italic}
  .note-block-label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);font-style:normal;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:.3rem}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem;text-align:center}
  .stat-num{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:700;color:var(--accent);line-height:1}
  .stat-label{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.3rem;letter-spacing:.05em;text-transform:uppercase}
  .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-bottom:2rem}
  .member-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem}
  .member-card-head{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;flex-shrink:0}
  .avatar.sm{width:28px;height:28px;font-size:.8rem}
  .member-name{font-weight:700;font-size:.9rem}
  .member-role{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace}
  .member-last{font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:.5rem}
  .member-today-tasks{font-size:.82rem;line-height:1.6;color:var(--ink)}
  .recent-section h3{font-family:'Fraunces',serif;font-weight:300;font-size:1.1rem;margin-bottom:1rem;color:var(--muted);letter-spacing:.02em}
  .export-note{background:var(--paper-alt);border:1px dashed var(--border);border-radius:3px;padding:.75rem 1rem;font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.03em;margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem;font-family:'DM Mono',monospace;letter-spacing:.04em}

  #toast{position:fixed;bottom:2rem;right:2rem;padding:.75rem 1.25rem;border-radius:3px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;font-family:'DM Mono',monospace;letter-spacing:.04em}
  #toast.show{opacity:1}
  #toast.success{background:var(--ink);color:var(--paper)}
  #toast.error{background:var(--accent);color:#fff}

  /* setup banner */
  .setup-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:3px;padding:.75rem 1rem;font-size:.8rem;font-family:'DM Mono',monospace;color:#856404;margin-bottom:1rem;line-height:1.6}
  .setup-banner strong{display:block;margin-bottom:.25rem}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">📓 Daily<span>Log</span></div>
    <div class="login-sub">公司工作日誌系統<br>請以公司 Google 帳號登入</div>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- ══ APP SCREEN ══ -->
<div id="screen-app">
  <header>
    <div class="logo">📓 Daily<span>Log</span></div>
    <div class="header-right">
      <span class="user-badge">👤 <span id="userBadge">…</span></span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </header>

  <nav class="nav-tabs">
    <div class="nav-tab active" onclick="showPanel('log',this)">📝 填寫日誌</div>
    <div class="nav-tab" onclick="showPanel('view',this)">📋 查看日誌</div>
    <div class="nav-tab" onclick="showPanel('dash',this)">📊 總覽看板</div>
  </nav>

  <!-- PANEL: LOG -->
  <div id="panel-log" class="panel active">
  <div class="container">
    <div class="section-head">
      <h2>填寫今日<em>工作日誌</em></h2>
      <span class="section-subtitle" id="todayDateLabel"></span>
    </div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-row">
          <label>姓名</label>
          <input type="text" id="f-name" readonly style="background:#f0ede4;">
        </div>
        <div class="form-row">
          <label>日期</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-row">
        <label>工作任務 <span style="font-size:.7rem;color:var(--muted)">（可多筆，標記進度）</span></label>
        <ul class="task-list" id="taskList">
          <li class="task-item">
            <input type="text" placeholder="例：整理客戶提案資料">
            <select><option value="done">✅ 完成</option><option value="wip" selected>🔄 進行中</option><option value="delayed">⏸ 延誤/未完</option></select>
            <button class="btn-icon" onclick="removeTask(this)">✕</button>
          </li>
        </ul>
        <button class="btn-add-task" onclick="addTask()">＋ 新增任務項目</button>
      </div>
      <div class="form-row">
        <label>今日重點摘要</label>
        <textarea id="f-summary" placeholder="簡短描述今天主要做了什麼、有什麼進展…"></textarea>
      </div>
      <div class="form-row">
        <label>備註 / 需要協助的事項</label>
        <textarea id="f-note" placeholder="有遇到任何問題、需要跨部門協助、或明天待辦的事項…" style="min-height:70px"></textarea>
      </div>
      <div class="form-row">
        <label>今日心情指數</label>
        <div class="mood-row">
          <div class="mood-chip" onclick="selectMood(this,'😫')">😫 很累</div>
          <div class="mood-chip" onclick="selectMood(this,'😕')">😕 普通</div>
          <div class="mood-chip selected" onclick="selectMood(this,'🙂')">🙂 還不錯</div>
          <div class="mood-chip" onclick="selectMood(this,'😄')">😄 很好</div>
          <div class="mood-chip" onclick="selectMood(this,'🚀')">🚀 超有幹勁</div>
        </div>
      </div>
      <button class="btn-submit" onclick="submitLog()">提交今日日誌 →</button>
    </div>
  </div>
  </div>

  <!-- PANEL: VIEW -->
  <div id="panel-view" class="panel">
  <div class="container">
    <div class="section-head">
      <h2>日誌<em>記錄查看</em></h2>
      <span class="section-subtitle">即時同步・所有成員</span>
    </div>
    <div class="filter-bar">
      <select id="filterMember" onchange="renderEntries()"><option value="">全部成員</option></select>
      <input type="date" id="filterDate" onchange="renderEntries()">
      <select id="filterStatus" onchange="renderEntries()">
        <option value="">全部狀態</option>
        <option value="done">✅ 已完成</option>
        <option value="wip">🔄 進行中</option>
        <option value="delayed">⏸ 延誤</option>
      </select>
      <button class="btn-small" onclick="clearFilters()">清除篩選</button>
    </div>
    <div id="entriesContainer"><div class="empty-state">載入中…</div></div>
  </div>
  </div>

  <!-- PANEL: DASH -->
  <div id="panel-dash" class="panel">
  <div class="container">
    <div class="section-head">
      <h2>團隊<em>總覽看板</em></h2>
      <span class="section-subtitle" id="dashDateLabel"></span>
    </div>
    <div class="export-note">
      💡 資料即時同步自 Firebase，老闆可隨時查看所有成員狀態
      <button class="btn-small" onclick="window.print()">🖨 列印</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="recent-section">
      <h3>成員今日狀態</h3>
      <div class="member-grid" id="memberGrid"></div>
    </div>
    <div class="recent-section">
      <h3>最新 10 筆日誌</h3>
      <div id="recentEntries"></div>
    </div>
  </div>
  </div>
</div><!-- end screen-app -->

<div id="toast"></div>
</body>
</html>
