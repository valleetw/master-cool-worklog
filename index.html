<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作日誌系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, doc,
    onSnapshot, query, orderBy, serverTimestamp, arrayUnion
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ↓↓↓ 把這裡換成你的 Firebase 設定 ↓↓↓
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  // ↑↑↑ 換到這裡為止 ↑↑↑

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── 白名單 ──
  const ALLOWED_EMAILS = [
    "boss@yourcompany.com",
    "staff1@yourcompany.com",
    "staff2@yourcompany.com",
    "staff3@yourcompany.com",
    "staff4@yourcompany.com",
    "staff5@yourcompany.com",
    "staff6@yourcompany.com",
  ];

  // ── 成員對照 ──
  const MEMBER_MAP = {
    "boss@yourcompany.com":   { name:"老闆 Alex", dept:"MGMT",  role:"執行長",   isAdmin:true  },
    "staff1@yourcompany.com": { name:"小芸",       dept:"ADMIN", role:"行政內勤", isAdmin:false },
    "staff2@yourcompany.com": { name:"大偉",       dept:"SALES", role:"業務專員", isAdmin:false },
    "staff3@yourcompany.com": { name:"雅婷",       dept:"DESIGN",role:"設計師",   isAdmin:false },
    "staff4@yourcompany.com": { name:"志明",       dept:"TECH",  role:"工程師",   isAdmin:false },
    "staff5@yourcompany.com": { name:"怡君",       dept:"MKT",   role:"行銷專員", isAdmin:false },
    "staff6@yourcompany.com": { name:"阿強",       dept:"SALES", role:"業務主管", isAdmin:false },
  };

  const AVATAR_COLORS = ['#c0392b','#2d6a4f','#b8963e','#2c3e50','#8e44ad','#16a085','#d35400'];

  let currentUser   = null;
  let currentMember = null;
  let allLogs       = [];
  let selectedMood  = '🙂';
  let editingLogId  = null;

  // ━━━━━ AUTH ━━━━━
  window.loginWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      if (!ALLOWED_EMAILS.includes(result.user.email)) {
        await signOut(auth);
        showMsg('此帳號不在授權名單內', 'error');
      }
    } catch(e) { showMsg('登入失敗：' + e.message, 'error'); }
  };
  window.logout = async () => {
    await signOut(auth); currentUser = null; currentMember = null; showScreen('login');
  };
  onAuthStateChanged(auth, user => {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
      currentUser   = user;
      currentMember = MEMBER_MAP[user.email] || { name:user.displayName, dept:'?', role:'', isAdmin:false };
      document.getElementById('f-name').value      = currentMember.name;
      document.getElementById('userBadge').textContent = currentMember.name;
      showScreen('app');
      startRealtimeSync();
    } else { showScreen('login'); }
  });

  // ━━━━━ REALTIME SYNC ━━━━━
  function startRealtimeSync() {
    const q = query(collection(db, 'logs'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snapshot => {
      allLogs = snapshot.docs.map(d => ({ id:d.id, ...d.data() }));
      renderEntries(); renderDash(); checkOverdue();
    });
  }

  // ━━━━━ OVERDUE CHECK ━━━━━
  function checkOverdue() {
    if (!currentUser) return;
    const today  = isoToday();
    const myLogs = allLogs.filter(l => l.userEmail === currentUser.email);
    const over   = myLogs.flatMap(l => (l.tasks||[]).filter(t =>
      t.status !== 'done' && t.deadline && t.deadline < today
    ).map(t => ({ ...t, logDate: l.date })));

    const b = document.getElementById('overdueBanner');
    if (!b) return;
    if (over.length) {
      b.style.display = 'block';
      b.innerHTML = `⚠️ 你有 <strong>${over.length}</strong> 個任務已超過預計完成日期：`
        + over.map(o => `<span class="overdue-item">「${o.text}」截止 ${formatDate(o.deadline)}</span>`).join('');
    } else { b.style.display = 'none'; }
  }

  // ━━━━━ SUBMIT / UPDATE ━━━━━
  window.submitLog = async () => {
    if (!currentUser) { showMsg('請先登入', 'error'); return; }
    const summary = document.getElementById('f-summary').value.trim();
    if (!summary) { showMsg('請填寫今日重點摘要', 'error'); return; }

    const tasks = [...document.querySelectorAll('#taskList .task-item')].map(li => ({
      text:     li.querySelector('.task-text').value.trim(),
      status:   li.querySelector('.task-status').value,
      deadline: li.querySelector('.task-deadline').value || null,
    })).filter(t => t.text);

    if (editingLogId) {
      try {
        await updateDoc(doc(db, 'logs', editingLogId), {
          summary, tasks,
          note: document.getElementById('f-note').value.trim(),
          mood: selectedMood,
          updatedAt: serverTimestamp(),
        });
        showMsg('日誌已更新！', 'success'); cancelEdit();
      } catch(e) { showMsg('更新失敗：' + e.message, 'error'); }
    } else {
      try {
        await addDoc(collection(db, 'logs'), {
          userEmail: currentUser.email, userName: currentMember.name,
          userDept: currentMember.dept, userRole: currentMember.role,
          date: document.getElementById('f-date').value, summary, tasks,
          note: document.getElementById('f-note').value.trim(),
          mood: selectedMood, comments: [], createdAt: serverTimestamp(),
        });
        showMsg('日誌已提交並同步！', 'success'); resetForm();
      } catch(e) { showMsg('提交失敗：' + e.message, 'error'); }
    }
  };

  window.startEdit = logId => {
    const log = allLogs.find(l => l.id === logId);
    if (!log) return;
    if (log.userEmail !== currentUser?.email) { showMsg('只能修改自己的日誌', 'error'); return; }
    if (log.date !== isoToday()) { showMsg('昨天以前的日誌已鎖定，請用補充留言', 'error'); return; }
    editingLogId = logId;
    document.getElementById('f-date').value    = log.date;
    document.getElementById('f-summary').value = log.summary;
    document.getElementById('f-note').value    = log.note || '';
    document.querySelectorAll('.mood-chip').forEach(c => {
      c.classList.toggle('selected', c.dataset.mood === log.mood);
    });
    selectedMood = log.mood || '🙂';
    document.getElementById('taskList').innerHTML =
      (log.tasks||[]).map(t => makeTaskItem(t)).join('') || makeTaskItem();
    document.getElementById('submitBtn').textContent      = '儲存修改 →';
    document.getElementById('submitBtn').style.background = 'var(--gold)';
    document.getElementById('cancelEditBtn').style.display = 'block';
    document.getElementById('editingBanner').style.display = 'block';
    showPanel('log', document.querySelector('.nav-tab'));
    window.scrollTo({ top:0, behavior:'smooth' });
  };

  window.cancelEdit = () => {
    editingLogId = null; resetForm();
    document.getElementById('submitBtn').textContent      = '提交今日日誌 →';
    document.getElementById('submitBtn').style.background = '';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('editingBanner').style.display = 'none';
  };

  window.addComment = async logId => {
    const input = document.getElementById('ci-' + logId);
    const text  = input?.value.trim();
    if (!text || !currentUser) return;
    try {
      await updateDoc(doc(db, 'logs', logId), {
        comments: arrayUnion({
          userEmail: currentUser.email, userName: currentMember.name,
          text, createdAt: new Date().toISOString(),
        })
      });
      input.value = '';
    } catch(e) { showMsg('留言失敗', 'error'); }
  };

  // ━━━━━ FORM HELPERS ━━━━━
  function makeTaskItem(t = {}) {
    return `<li class="task-item">
      <input type="text" class="task-text" placeholder="任務名稱" value="${t.text||''}">
      <select class="task-status">
        <option value="todo"    ${t.status==='todo'   ?'selected':''}>📋 待辦</option>
        <option value="wip"     ${t.status==='wip'    ?'selected':''}>🔄 進行中</option>
        <option value="done"    ${t.status==='done'   ?'selected':''}>✅ 完成</option>
        <option value="delayed" ${t.status==='delayed'?'selected':''}>⏸ 延誤</option>
      </select>
      <input type="date" class="task-deadline" value="${t.deadline||''}" title="預計完成日期">
      <button class="btn-icon" onclick="removeTask(this)">✕</button>
    </li>`;
  }
  window.addTask    = () => document.getElementById('taskList').insertAdjacentHTML('beforeend', makeTaskItem());
  window.removeTask = btn => { const l = document.getElementById('taskList'); if (l.children.length > 1) btn.closest('li').remove(); };
  window.selectMood = (el, mood) => {
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected'); selectedMood = mood;
  };
  function resetForm() {
    document.getElementById('f-summary').value = '';
    document.getElementById('f-note').value    = '';
    document.getElementById('taskList').innerHTML = makeTaskItem();
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.toggle('selected', c.dataset.mood === '🙂'));
    selectedMood = '🙂';
  }

  // ━━━━━ RENDER ENTRIES ━━━━━
  window.renderEntries = () => {
    let fl = [...allLogs];
    const fm = document.getElementById('filterMember')?.value;
    const fd = document.getElementById('filterDate')?.value;
    const fs = document.getElementById('filterStatus')?.value;
    if (fm) fl = fl.filter(l => l.userEmail === fm);
    if (fd) fl = fl.filter(l => l.date === fd);
    if (fs) fl = fl.filter(l => (l.tasks||[]).some(t => t.status === fs));
    const c = document.getElementById('entriesContainer');
    if (!c) return;
    c.innerHTML = fl.length ? fl.map(entryCard).join('') : '<div class="empty-state">找不到符合條件的日誌記錄</div>';
    const sel = document.getElementById('filterMember');
    if (sel && sel.options.length <= 1) {
      [...new Set(allLogs.map(l => l.userEmail))].forEach(email => {
        const m = MEMBER_MAP[email]; if (!m) return;
        const o = document.createElement('option'); o.value = email; o.textContent = m.name; sel.appendChild(o);
      });
    }
  };

  function memberColor(email) {
    const keys = Object.keys(MEMBER_MAP); return AVATAR_COLORS[keys.indexOf(email) % AVATAR_COLORS.length];
  }

  function dlTag(t) {
    if (!t.deadline) return '';
    const today = isoToday();
    if (t.status !== 'done' && t.deadline < today) return `<span class="dl-tag overdue">⚠ 逾期</span>`;
    if (t.status !== 'done' && t.deadline === today) return `<span class="dl-tag today">⏰ 今日截止</span>`;
    return `<span class="dl-tag">${t.deadline.slice(5).replace('-','/')}</span>`;
  }

  function entryCard(e) {
    const color   = memberColor(e.userEmail);
    const isOwn   = currentUser && e.userEmail === currentUser.email;
    const canEdit = isOwn && e.date === isoToday();
    const locked  = isOwn && e.date !== isoToday();
    const chips   = (e.tasks||[]).map(t => `
      <span class="task-chip ${t.status}"><span class="task-dot"></span>${t.text}${dlTag(t)}</span>`).join('');
    const noteHtml = e.note ? `<div class="note-block"><span class="note-lbl">備註 / 待協助</span>${e.note}</div>` : '';
    const comments = e.comments||[];
    const commHtml = comments.map(c => `
      <div class="comment-item">
        <span class="c-author">${c.userName}</span>
        <span class="c-text">${c.text}</span>
        <span class="c-time">${(c.createdAt||'').slice(0,10)}</span>
      </div>`).join('');
    const actionBtn = canEdit
      ? `<button class="btn-edit" onclick="event.stopPropagation();startEdit('${e.id}')">✏ 修改</button>`
      : locked ? `<span class="lock-tag">🔒 鎖定</span>` : '';

    return `<div class="entry-card" onclick="this.classList.toggle('expanded')">
      <div class="entry-header">
        <div style="flex:1;min-width:0">
          <div class="entry-meta">
            <span class="avatar sm" style="background:${color}">${(e.userName||'?')[0]}</span>
            <span class="entry-author">${e.userName||e.userEmail}</span>
            <span class="dept-tag">${e.userDept||'?'}</span>
            <span class="entry-mood">${e.mood||''}</span>
            ${e.updatedAt ? '<span class="updated-tag">已編輯</span>' : ''}
          </div>
          <div class="entry-summary">${e.summary}</div>
        </div>
        <div class="entry-actions">
          <div class="entry-date">${formatDate(e.date)}</div>
          ${actionBtn}
        </div>
      </div>
      <div class="entry-details">
        <div class="tasks-section">
          <h4>工作任務</h4>
          <div class="task-chips">${chips||'<span style="font-size:.8rem;color:var(--muted)">無任務項目</span>'}</div>
        </div>
        ${noteHtml}
        <div class="comments-section" onclick="event.stopPropagation()">
          <h4>補充留言 ${comments.length ? `<span class="c-count">${comments.length}</span>` : ''}</h4>
          <div class="comments-list">${commHtml}</div>
          <div class="c-input-row">
            <input id="ci-${e.id}" type="text" placeholder="補充說明或更正…" onkeydown="if(event.key==='Enter')addComment('${e.id}')">
            <button class="btn-comment" onclick="addComment('${e.id}')">送出</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ━━━━━ RENDER DASH ━━━━━
  window.renderDash = () => {
    const today     = isoToday();
    const todayLogs = allLogs.filter(l => l.date === today);
    const allTasks  = allLogs.flatMap(l => l.tasks||[]);
    const overdueCt = allTasks.filter(t => t.status !== 'done' && t.deadline && t.deadline < today).length;

    const sg = document.getElementById('statsGrid');
    if (sg) sg.innerHTML = `
      <div class="stat-card"><div class="stat-num">${Object.keys(MEMBER_MAP).filter(e=>!MEMBER_MAP[e].isAdmin).length}</div><div class="stat-label">團隊成員</div></div>
      <div class="stat-card"><div class="stat-num">${todayLogs.length}</div><div class="stat-label">今日已提交</div></div>
      <div class="stat-card"><div class="stat-num">${allLogs.length}</div><div class="stat-label">總日誌筆數</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--success)">${allTasks.filter(t=>t.status==='done').length}</div><div class="stat-label">累計完成</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${allTasks.filter(t=>t.status==='delayed').length}</div><div class="stat-label">延誤中</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${overdueCt}</div><div class="stat-label">已逾期未完</div></div>`;

    const mg = document.getElementById('memberGrid');
    if (mg) {
      mg.innerHTML = Object.entries(MEMBER_MAP).filter(([,v])=>!v.isAdmin).map(([email,m],i) => {
        const tl = todayLogs.find(l => l.userEmail === email);
        const myOver = allLogs.filter(l=>l.userEmail===email).flatMap(l=>l.tasks||[])
          .filter(t => t.status!=='done' && t.deadline && t.deadline < today);
        const status = tl
          ? `<span class="m-status ok">✅ 今日已提交 ${tl.mood}</span>`
          : `<span class="m-status ng">⏳ 尚未提交</span>`;
        const overdueWarn = myOver.length
          ? `<div class="m-overdue">⚠ ${myOver.length} 個任務逾期</div>` : '';
        const tasks = tl
          ? (tl.tasks||[]).map(t => `<div class="m-task">${{done:'✅',wip:'🔄',delayed:'⏸',todo:'📋'}[t.status]||'•'} ${t.text}${t.deadline&&t.deadline<today&&t.status!=='done'?'<span style="color:var(--accent);font-size:.7rem"> ⚠逾期</span>':''}</div>`).join('')
          : '<div style="color:var(--muted)">—</div>';
        return `<div class="member-card">
          <div class="member-card-head">
            <div class="avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">${m.name[0]}</div>
            <div><div class="member-name">${m.name}</div><div class="member-role">${m.dept} · ${m.role}</div></div>
          </div>
          ${status}${overdueWarn}<div class="m-tasks">${tasks}</div>
        </div>`;
      }).join('');
    }
    const re = document.getElementById('recentEntries');
    if (re) re.innerHTML = allLogs.slice(0,10).map(entryCard).join('') || '<div class="empty-state">尚無日誌</div>';
  };

  window.clearFilters = () => {
    ['filterMember','filterDate','filterStatus'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    renderEntries();
  };
  window.showPanel = (id, el) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-'+id).classList.add('active');
    if (el) el.classList.add('active');
    if (id==='dash') renderDash();
    if (id==='view') renderEntries();
  };

  function isoToday() { return new Date().toISOString().split('T')[0]; }
  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d+'T00:00:00');
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
  }
  function showMsg(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show '+type;
    setTimeout(() => t.className = '', 3000);
  }
  function showScreen(name) {
    document.getElementById('screen-login').style.display = name==='login' ? 'flex' : 'none';
    document.getElementById('screen-app').style.display   = name==='app'   ? 'block' : 'none';
  }
  window.addEventListener('DOMContentLoaded', () => {
    const today = isoToday();
    document.getElementById('f-date').value             = today;
    document.getElementById('todayDateLabel').textContent = formatDate(today);
    document.getElementById('dashDateLabel').textContent  = formatDate(today);
    showScreen('login');
  });
</script>

<style>
  :root{--ink:#1a1a18;--paper:#f5f0e8;--paper-alt:#ede8d8;--accent:#c0392b;--accent-soft:#e8d5d2;
    --gold:#b8963e;--border:#c8c0a8;--muted:#8a8070;--success:#2d6a4f;--success-bg:#d8f3dc;
    --tag-bg:#e8e0d0;--shadow:rgba(26,26,24,.12);--warn:#856404;--warn-bg:#fff3cd}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif;min-height:100vh;
    background-image:linear-gradient(rgba(200,192,168,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(200,192,168,.15) 1px,transparent 1px);background-size:40px 40px}

  /* LOGIN */
  #screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem}
  .login-box{background:#fff;border:1px solid var(--border);border-radius:4px;padding:3rem 2.5rem;text-align:center;max-width:380px;width:90%;box-shadow:6px 6px 0 var(--paper-alt),6px 6px 0 1px var(--border)}
  .login-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;margin-bottom:.5rem}
  .login-logo span{color:var(--accent)}
  .login-sub{font-size:.82rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.04em;margin-bottom:2rem}
  .btn-google{display:inline-flex;align-items:center;gap:.75rem;padding:.8rem 1.5rem;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;transition:all .2s;width:100%;justify-content:center}
  .btn-google:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .google-icon{width:20px;height:20px;flex-shrink:0}

  /* APP SHELL */
  #screen-app{display:none}
  header{background:var(--ink);color:var(--paper);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px var(--shadow)}
  .logo{font-family:'Fraunces',serif;font-size:1.35rem;letter-spacing:.04em;display:flex;align-items:center;gap:10px}
  .logo span{color:var(--gold)}
  .header-right{display:flex;align-items:center;gap:.75rem}
  .user-badge{font-family:'DM Mono',monospace;font-size:.75rem;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:20px;letter-spacing:.05em;border:1px solid rgba(255,255,255,.18)}
  .btn-logout{font-size:.75rem;font-family:'DM Mono',monospace;background:none;border:1px solid rgba(255,255,255,.3);color:var(--paper);padding:4px 10px;border-radius:20px;cursor:pointer;transition:background .2s}
  .btn-logout:hover{background:rgba(255,255,255,.15)}

  /* BANNERS */
  #overdueBanner{display:none;background:#fff8e1;border-bottom:2px solid #ffc107;border-left:4px solid var(--accent);padding:.8rem 1.5rem;font-size:.82rem;color:var(--warn);font-family:'DM Mono',monospace;line-height:1.9}
  .overdue-item{display:inline-block;background:#fff;border:1px solid #ffc107;border-radius:3px;padding:1px 8px;margin:2px 4px;font-size:.79rem}
  #editingBanner{display:none;background:var(--warn-bg);border:1px solid var(--gold);border-radius:3px;padding:.65rem 1rem;font-size:.82rem;color:var(--warn);font-family:'DM Mono',monospace;margin-bottom:1rem}

  .nav-tabs{display:flex;background:var(--paper-alt);border-bottom:2px solid var(--border);padding:0 2rem;overflow-x:auto}
  .nav-tab{padding:.75rem 1.5rem;font-size:.85rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;color:var(--muted);letter-spacing:.04em;transition:all .2s;font-weight:600}
  .nav-tab:hover{color:var(--ink)}
  .nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
  .panel{display:none}.panel.active{display:block}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
  .section-head h2{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;letter-spacing:.02em}
  .section-head h2 em{font-style:italic;color:var(--accent)}
  .section-subtitle{font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace}

  /* FORM */
  .form-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:2rem;box-shadow:4px 4px 0 var(--paper-alt),4px 4px 0 1px var(--border)}
  .form-row{margin-bottom:1.25rem}
  .form-row label{display:block;font-size:.78rem;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:.65rem .85rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif;font-size:.92rem;transition:border-color .2s,box-shadow .2s;outline:none}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .form-row textarea{resize:vertical;min-height:100px;line-height:1.8}
  /* summary 強調 */
  #f-summary{border-left:4px solid var(--accent);padding-left:.75rem;background:#fffcfb;font-size:.96rem}
  #f-summary:focus{border-left-color:var(--gold);box-shadow:0 0 0 3px var(--accent-soft)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media(max-width:600px){.form-grid{grid-template-columns:1fr}}

  /* TASKS */
  .task-list{list-style:none}
  .task-item{display:grid;grid-template-columns:1fr 130px 130px 32px;gap:.4rem;margin-bottom:.5rem;align-items:center}
  @media(max-width:640px){.task-item{grid-template-columns:1fr 32px;row-gap:.3rem}
    .task-status{grid-column:1}.task-deadline{grid-column:1}}
  .task-text{padding:.55rem .75rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);font-family:'Noto Serif TC',serif;font-size:.88rem;outline:none;width:100%}
  .task-text:focus{border-color:var(--accent)}
  .task-status,.task-deadline{font-size:.8rem;padding:.5rem .6rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);color:var(--ink);outline:none;font-family:'DM Mono',monospace;width:100%}
  .task-status:focus,.task-deadline:focus{border-color:var(--accent)}
  .btn-icon{width:32px;height:32px;border:1px solid var(--border);background:var(--paper);border-radius:3px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  .btn-icon:hover{background:var(--accent-soft)}
  .btn-add-task{font-size:.78rem;font-family:'DM Mono',monospace;color:var(--accent);cursor:pointer;background:none;border:none;letter-spacing:.05em;margin-top:.5rem;padding:0}
  .btn-add-task:hover{text-decoration:underline}
  .task-hint{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:.35rem}

  /* MOOD */
  .mood-row{display:flex;gap:.5rem;flex-wrap:wrap}
  .mood-chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.85rem;cursor:pointer;transition:all .2s;background:var(--paper)}
  .mood-chip:hover{border-color:var(--accent)}
  .mood-chip.selected{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* BUTTONS */
  .btn-submit{width:100%;padding:.85rem;background:var(--ink);color:var(--paper);border:none;border-radius:3px;font-family:'Noto Serif TC',serif;font-size:.95rem;cursor:pointer;letter-spacing:.06em;margin-top:.5rem;transition:background .2s}
  .btn-submit:hover{filter:brightness(1.15)}
  .btn-cancel{width:100%;padding:.65rem;background:none;color:var(--muted);border:1px solid var(--border);border-radius:3px;font-family:'DM Mono',monospace;font-size:.82rem;cursor:pointer;margin-top:.5rem;display:none;transition:all .2s}
  .btn-cancel:hover{background:var(--paper-alt)}

  /* FILTER */
  .filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
  .filter-bar select,.filter-bar input[type="date"]{padding:.45rem .8rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);font-family:'DM Mono',monospace;font-size:.8rem;color:var(--ink);outline:none}
  .btn-small{padding:4px 12px;border:1px solid var(--border);border-radius:3px;background:#fff;font-size:.75rem;font-family:'DM Mono',monospace;cursor:pointer;transition:background .15s;letter-spacing:.03em;flex-shrink:0}
  .btn-small:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* ENTRY CARDS */
  .entry-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem 1.5rem;margin-bottom:1rem;transition:box-shadow .2s;cursor:pointer}
  .entry-card:hover{box-shadow:3px 3px 0 var(--border)}
  .entry-header{display:flex;align-items:flex-start;gap:1rem;justify-content:space-between}
  .entry-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.35rem}
  .entry-date{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted)}
  .entry-author{font-weight:700;font-size:.88rem}
  .dept-tag{font-family:'DM Mono',monospace;font-size:.68rem;background:var(--tag-bg);padding:2px 8px;border-radius:2px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
  .updated-tag{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);border:1px solid var(--gold);padding:1px 6px;border-radius:2px}
  /* 摘要強調 */
  .entry-summary{font-size:.92rem;color:var(--ink);line-height:1.7;border-left:3px solid var(--border);padding-left:.75rem;margin-top:.3rem;transition:border-color .2s}
  .entry-card.expanded .entry-summary{border-left-color:var(--accent);font-weight:600}
  .entry-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .entry-details{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--paper-alt)}
  .entry-card.expanded .entry-details{display:block}
  .btn-edit{font-size:.75rem;font-family:'DM Mono',monospace;padding:3px 10px;border:1px solid var(--gold);border-radius:3px;background:#fff;color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-edit:hover{background:var(--gold);color:#fff}
  .lock-tag{font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:3px}

  /* TASK CHIPS */
  .tasks-section{margin-top:.75rem}
  .tasks-section h4,.comments-section h4{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
  .task-chips{display:flex;flex-wrap:wrap;gap:.4rem}
  .task-chip{font-size:.8rem;padding:5px 10px;border-radius:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .task-chip.done{background:var(--success-bg);color:var(--success)}
  .task-chip.wip{background:#fff3cd;color:var(--warn)}
  .task-chip.delayed{background:#f8d7da;color:#721c24}
  .task-chip.todo{background:var(--tag-bg);color:var(--ink)}
  .task-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .dl-tag{font-size:.7rem;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:2px;background:rgba(0,0,0,.07);margin-left:2px}
  .dl-tag.overdue{background:#fde8e8;color:var(--accent);font-weight:700}
  .dl-tag.today{background:#fff3cd;color:var(--warn);font-weight:700}

  /* NOTE */
  .note-block{margin-top:.75rem;padding:.75rem;background:var(--paper);border-left:3px solid var(--gold);font-size:.86rem;line-height:1.7;color:var(--ink);font-style:italic}
  .note-lbl{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);font-style:normal;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:.3rem}

  /* COMMENTS */
  .comments-section{margin-top:1rem;padding-top:.75rem;border-top:1px dashed var(--border)}
  .c-count{background:var(--ink);color:var(--paper);font-size:.65rem;border-radius:10px;padding:1px 7px}
  .comments-list{margin-bottom:.5rem}
  .comment-item{display:flex;gap:.5rem;align-items:baseline;padding:.4rem 0;border-bottom:1px solid var(--paper-alt);flex-wrap:wrap}
  .c-author{font-weight:700;font-size:.78rem;color:var(--accent);white-space:nowrap}
  .c-text{flex:1;font-size:.82rem;line-height:1.5;color:var(--ink)}
  .c-time{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);white-space:nowrap}
  .c-input-row{display:flex;gap:.4rem;margin-top:.5rem}
  .c-input-row input{flex:1;padding:.45rem .7rem;border:1px solid var(--border);border-radius:3px;background:var(--paper);font-family:'Noto Serif TC',serif;font-size:.85rem;outline:none}
  .c-input-row input:focus{border-color:var(--accent)}
  .btn-comment{padding:.45rem .85rem;background:var(--ink);color:var(--paper);border:none;border-radius:3px;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:background .2s}
  .btn-comment:hover{background:var(--accent)}

  /* DASHBOARD */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:2rem}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem;text-align:center}
  .stat-num{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:700;color:var(--accent);line-height:1}
  .stat-label{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.3rem;letter-spacing:.05em;text-transform:uppercase}
  .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-bottom:2rem}
  .member-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:1.25rem}
  .member-card-head{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;flex-shrink:0}
  .avatar.sm{width:28px;height:28px;font-size:.8rem}
  .member-name{font-weight:700;font-size:.9rem}
  .member-role{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace}
  .m-status{display:block;font-size:.78rem;font-family:'DM Mono',monospace;margin-bottom:.4rem}
  .m-status.ok{color:var(--success)}.m-status.ng{color:var(--accent)}
  .m-overdue{font-size:.75rem;color:var(--accent);font-family:'DM Mono',monospace;background:#fde8e8;padding:2px 6px;border-radius:2px;margin-bottom:.4rem;display:inline-block}
  .m-tasks{font-size:.82rem;line-height:1.7;color:var(--ink)}
  .m-task{padding:1px 0}
  .recent-section h3{font-family:'Fraunces',serif;font-weight:300;font-size:1.1rem;margin-bottom:1rem;color:var(--muted);letter-spacing:.02em}
  .export-note{background:var(--paper-alt);border:1px dashed var(--border);border-radius:3px;padding:.75rem 1rem;font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem;font-family:'DM Mono',monospace;letter-spacing:.04em}

  #toast{position:fixed;bottom:2rem;right:2rem;padding:.75rem 1.25rem;border-radius:3px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;font-family:'DM Mono',monospace;letter-spacing:.04em}
  #toast.show{opacity:1}
  #toast.success{background:var(--ink);color:var(--paper)}
  #toast.error{background:var(--accent);color:#fff}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">📓 Daily<span>Log</span></div>
    <div class="login-sub">公司工作日誌系統<br>請以公司 Google 帳號登入</div>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <header>
    <div class="logo">📓 Daily<span>Log</span></div>
    <div class="header-right">
      <span class="user-badge">👤 <span id="userBadge">…</span></span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </header>

  <div id="overdueBanner"></div>

  <nav class="nav-tabs">
    <div class="nav-tab active" onclick="showPanel('log',this)">📝 填寫日誌</div>
    <div class="nav-tab" onclick="showPanel('view',this)">📋 查看日誌</div>
    <div class="nav-tab" onclick="showPanel('dash',this)">📊 總覽看板</div>
  </nav>

  <!-- LOG -->
  <div id="panel-log" class="panel active">
  <div class="container">
    <div class="section-head">
      <h2>填寫今日<em>工作日誌</em></h2>
      <span class="section-subtitle" id="todayDateLabel"></span>
    </div>
    <div id="editingBanner">✏️ 修改模式：你正在編輯今日日誌。隔天起將自動鎖定，需透過補充留言更正。</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-row">
          <label>姓名</label>
          <input type="text" id="f-name" readonly style="background:#f0ede4">
        </div>
        <div class="form-row">
          <label>日期</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-row">
        <label>今日重點摘要 ✦</label>
        <textarea id="f-summary" placeholder="今天做了什麼、有什麼關鍵進展？用一兩句說清楚…"></textarea>
      </div>
      <div class="form-row">
        <label>工作任務清單 <span style="font-size:.7rem;color:var(--muted)">（可設定預計完成日期）</span></label>
        <ul class="task-list" id="taskList">
          <li class="task-item">
            <input type="text" class="task-text" placeholder="任務名稱">
            <select class="task-status">
              <option value="todo">📋 待辦</option>
              <option value="wip" selected>🔄 進行中</option>
              <option value="done">✅ 完成</option>
              <option value="delayed">⏸ 延誤</option>
            </select>
            <input type="date" class="task-deadline" title="預計完成日期">
            <button class="btn-icon" onclick="removeTask(this)">✕</button>
          </li>
        </ul>
        <button class="btn-add-task" onclick="addTask()">＋ 新增任務項目</button>
        <div class="task-hint">💡 設定截止日期後，若任務未完成會在登入時自動顯示提醒</div>
      </div>
      <div class="form-row">
        <label>備註 / 需要協助的事項</label>
        <textarea id="f-note" placeholder="有遇到問題、需要跨部門協助、或明天要記得的事…" style="min-height:70px"></textarea>
      </div>
      <div class="form-row">
        <label>今日心情指數</label>
        <div class="mood-row">
          <div class="mood-chip" data-mood="😫" onclick="selectMood(this,'😫')">😫 很累</div>
          <div class="mood-chip" data-mood="😕" onclick="selectMood(this,'😕')">😕 普通</div>
          <div class="mood-chip selected" data-mood="🙂" onclick="selectMood(this,'🙂')">🙂 還不錯</div>
          <div class="mood-chip" data-mood="😄" onclick="selectMood(this,'😄')">😄 很好</div>
          <div class="mood-chip" data-mood="🚀" onclick="selectMood(this,'🚀')">🚀 超有幹勁</div>
        </div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitLog()">提交今日日誌 →</button>
      <button class="btn-cancel" id="cancelEditBtn" onclick="cancelEdit()">取消修改，回到原始內容</button>
    </div>
  </div>
  </div>

  <!-- VIEW -->
  <div id="panel-view" class="panel">
  <div class="container">
    <div class="section-head">
      <h2>日誌<em>記錄查看</em></h2>
      <span class="section-subtitle">即時同步・所有成員</span>
    </div>
    <div class="filter-bar">
      <select id="filterMember" onchange="renderEntries()"><option value="">全部成員</option></select>
      <input type="date" id="filterDate" onchange="renderEntries()">
      <select id="filterStatus" onchange="renderEntries()">
        <option value="">全部狀態</option>
        <option value="todo">📋 待辦</option>
        <option value="wip">🔄 進行中</option>
        <option value="done">✅ 完成</option>
        <option value="delayed">⏸ 延誤</option>
      </select>
      <button class="btn-small" onclick="clearFilters()">清除篩選</button>
    </div>
    <div id="entriesContainer"><div class="empty-state">載入中…</div></div>
  </div>
  </div>

  <!-- DASH -->
  <div id="panel-dash" class="panel">
  <div class="container">
    <div class="section-head">
      <h2>團隊<em>總覽看板</em></h2>
      <span class="section-subtitle" id="dashDateLabel"></span>
    </div>
    <div class="export-note">💡 資料即時同步自 Firebase，老闆可隨時查看所有成員狀態
      <button class="btn-small" onclick="window.print()">🖨 列印</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="recent-section">
      <h3>成員今日狀態</h3>
      <div class="member-grid" id="memberGrid"></div>
    </div>
    <div class="recent-section">
      <h3>最新 10 筆日誌</h3>
      <div id="recentEntries"></div>
    </div>
  </div>
  </div>
</div>

<div id="toast"></div>
</body>
</html>
